<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ accion }} Contacto — ContactoApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0f0e0d; --paper: #f5f2ec; --accent: #c84b2f; --muted: #7a7570; --border: #dedad4; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); min-height: 100vh; }
    nav {
      background: var(--ink); padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: #fff; font-size: 18px; letter-spacing: -0.5px; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-size: 12px; color: #aaa; text-decoration: none; transition: color 0.15s; }
    .nav-back:hover { color: #fff; }

    .container { max-width: 560px; margin: 0 auto; padding: 52px 24px; }
    .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 32px; letter-spacing: -1.2px; color: var(--ink); margin-bottom: 32px; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: 2px; padding: 40px; box-shadow: 6px 6px 0 var(--border); }

    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="email"] {
      width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--ink); background: var(--paper);
      outline: none; transition: border-color 0.15s; margin-bottom: 24px;
    }
    input:focus { border-color: var(--accent); background: #fff; }

    .error {
      background: #fff0ed; border-left: 3px solid var(--accent);
      color: var(--accent); font-size: 13px; padding: 10px 14px;
      margin-bottom: 24px; border-radius: 0 2px 2px 0;
    }

    .form-actions { display: flex; gap: 12px; }
    .btn-submit {
      flex: 1; padding: 13px; background: var(--ink); color: #fff;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 0.5px; border: none; border-radius: 2px; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--accent); }
    .btn-cancel {
      padding: 13px 20px; background: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      border: 1.5px solid var(--border); border-radius: 2px; text-decoration: none;
      display: flex; align-items: center; transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }

    .required { color: var(--accent); margin-left: 2px; }
    .hint-text { font-size: 11px; color: var(--muted); margin-top: -18px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Contacto<span>App</span></div>
    <a href="/contactos" class="nav-back" id="link-volver">← Volver a contactos</a>
  </nav>

  <div class="container">
    <div class="page-title">{{ accion }} contacto</div>

    <div class="card">
      {% if error %}
      <div class="error" id="error-msg">{{ error }}</div>
      {% endif %}

      <form method="POST" id="form-contacto">
        <label for="nombre">Nombre <span class="required">*</span></label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Maria Garcia"
       value="{{ contacto.nombre if contacto else '' }}">
        <p class="hint-text">Máximo 100 caracteres</p>

        <label for="email">Email <span class="required">*</span></label>
        <input type="text" id="email" name="email" placeholder="Ej: maria@ejemplo.com"
               value="{{ contacto.email if contacto else '' }}" maxlength="150">

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono" placeholder="Ej: +1 809 555 1234"
               value="{{ contacto.telefono if contacto else '' }}">

        <div class="form-actions">
          <button type="submit" class="btn-submit" id="btn-guardar">{{ accion }} contacto</button>
          <a href="/contactos" class="btn-cancel" id="btn-cancelar">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
